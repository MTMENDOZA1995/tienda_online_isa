<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo de Productos | INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css"> 
    <link rel="stylesheet" href="Productos.css"> 
    
    <style>
        /* Ajustes para alinear Logo y Buscador en la misma fila (Igual que index) */
        .app-top-header {
            padding: 10px 15px 0 15px; /* Quitamos padding bottom para que los chips peguen bien */
        }
        .header-top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 10px; /* Separación con los chips */
        }
        .header-logo-compact {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        .header-logo-compact img {
            height: 35px;
            width: auto;
        }
        .header-search-form {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .header-search-form i.fa-magnifying-glass {
            position: absolute;
            left: 15px;
            color: #888;
            font-size: 14px;
        }
        .header-search-form input {
            width: 100%;
            border: none;
            border-radius: 25px;
            padding: 10px 15px 10px 40px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            outline: none;
        }
        .header-search-form i.camera-icon {
            position: absolute;
            right: 15px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
        }

        /* Estilos del Badge en la barra inferior */
        .bottom-cart-icon {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bottom-cart-icon .cart-badge {
            position: absolute;
            top: -5px;
            right: 5px;
            background-color: #ff3b30;
            color: white;
            font-size: 9px;
            font-weight: 700;
            height: 16px;
            min-width: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid white;
            z-index: 10;
        }
        
        /* Ajuste a los chips para que se vean integrados a la cabecera */
        .category-filter-chips {
            position: static; 
            top: auto; 
            margin: 0 -15px; /* Para que ocupen todo el ancho de la pantalla */
            background-color: transparent; 
            padding: 0 15px 10px 15px;
        }
    </style>
</head>
<body class="app-body">

    <header class="app-top-header">
        <div class="header-top-bar">
            <a href="index.html" class="header-logo-compact">
                <img src="imagenes/logo.png" alt="Logo">
            </a>
            
            <div class="header-search-form">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="catalog-search-input" placeholder="Buscar productos...">
                <i class="fa-solid fa-camera camera-icon"></i>
            </div>
        </div>

        <div class="category-filter-chips">
            <div class="chips-container" id="category-chips">
                <button class="chip active" data-category="all">Todas</button>
                <button class="chip" data-category="celulares">Celulares</button>
                <button class="chip" data-category="tecnologia">Tecnología</button>
                <button class="chip" data-category="mascotas">Mascotas</button>
                <button class="chip" data-category="joyeria">Joyería</button>
                <button class="chip" data-category="ropa">Ropa</button>
                <button class="chip" data-category="coleccion">Colección</button>
                <button class="chip" data-category="pulseras">Pulseras</button>
                <button class="chip" data-category="llaveros">Llaveros</button>
            </div>
        </div>
    </header>

    <main class="app-main-content">
        
        <section class="app-section" style="background: transparent; padding-top: 15px; padding-bottom: 40px;">
            <div class="section-header" style="margin-bottom: 10px;">
                <h2 style="font-size: 14px; color: #666; font-weight: 500;">Mostrando resultados</h2>
            </div>
            
            <div class="products-grid-vertical" id="product-list">
                </div>
            
            <div id="loading-spinner" style="display: none; text-align: center; padding: 20px; color: #6cc82a;">
                <i class="fa-solid fa-spinner fa-spin fa-2xl"></i>
            </div>
        </section>

        <section class="app-trust-section">
            <div class="trust-item">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Compra Segura</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-box-open"></i>
                <p>Devoluciones</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-headset"></i>
                <p>Centro de Ayuda</p>
            </div>
        </section>

        <footer class="app-footer-lite">
            <p>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</p>
            <div class="footer-links-lite">
                <a href="#">Términos</a>
                <a href="#">Privacidad</a>
                <a href="#">Políticas</a>
            </div>
        </footer>
    </main>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="Productos.html" class="nav-item active">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Buscar</span>
        </a>
        
        <a href="FCompra.html" class="nav-item bottom-cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="bottom-cart-badge">0</span>
            <span>Bolsa</span>
        </a>

        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-box-archive"></i>
            <span>Pedidos</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Cuenta</span>
        </a>
    </nav>

    <script src="js/cart.js" defer></script>
    <script src="js/Products.js" defer></script>
    <script src="js/search.js" defer></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if(typeof window.updateCartBadge === 'function') {
                const originalUpdate = window.updateCartBadge;
                window.updateCartBadge = () => {
                    originalUpdate(); 
                    const cart = window.appCart || [];
                    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                    const bottomBadge = document.getElementById('bottom-cart-badge');
                    if (bottomBadge) {
                        bottomBadge.textContent = totalItems;
                        if(totalItems > 0) {
                            bottomBadge.style.transform = 'scale(1.2)';
                            setTimeout(() => bottomBadge.style.transform = 'scale(1)', 200);
                        }
                    }
                };
                setTimeout(window.updateCartBadge, 500);
            }
        });
    </script>
</body>
</html>
