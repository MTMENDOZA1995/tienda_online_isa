<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* CABECERA (HEADER) ALINEADA */

        .header-top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }
        .header-logo-compact {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        .header-logo-compact img {
            height: 35px; 
            width: auto;
            object-fit: contain;
        }
        
        /* BUSCADOR PROFESIONAL TIPO APP */
        .header-search-form {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .header-search-form i.fa-magnifying-glass {
            position: absolute;
            left: 15px;
            color: #888;
            font-size: 14px;
            pointer-events: none;
        }
        .header-search-form input {
            width: 100%;
            border: none;
            border-radius: 25px;
            padding: 10px 40px 10px 38px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            outline: none;
            -webkit-appearance: none;
        }
        .header-search-form input[type="search"]::-webkit-search-cancel-button {
            display: none;
        }
        .header-search-form i.camera-icon {
            position: absolute;
            right: 15px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            padding: 5px;
        }

        /* BARRA INFERIOR (BOTTOM NAV) & BADGE */
        .bottom-cart-icon {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bottom-cart-icon .cart-badge {
            position: absolute;
            top: -5px;
            right: 5px; 
            background-color: #ff3b30;
            color: white;
            font-size: 9px;
            font-weight: 700;
            height: 16px;
            min-width: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid white; 
            z-index: 10;
            transition: transform 0.2s ease;
        }
        
        /* Ocultar elementos dinámicamente durante la búsqueda */
        .search-active-hide {
            display: none !important;
        }
    </style>
</head>
<body class="app-body">

    <header class="app-top-header">
        <div class="header-top-bar">
            <a href="index.html" class="header-logo-compact" aria-label="Ir al inicio">
                <img src="imagenes/logo.png" alt="Logo">
            </a>
            
            <form class="header-search-form" action="javascript:void(0);" onsubmit="executeMainSearch();">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input 
                    type="search" 
                    id="main-search-input" 
                    placeholder="Buscar Productos..." 
                    enterkeyhint="search"
                    autocomplete="off"
                >
                <i class="fa-solid fa-camera camera-icon"></i>
            </form>
        </div>
    </header>

    <main class="app-main-content" id="main-content-area">
        
        <section class="quick-access-scroll toggleable-section">
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-fire"></i></div>
                <span>Ofertas</span>
            </div>
            <div class="quick-item" onclick="window.location.href='Ecopoints.html'" style="cursor: pointer;">
                <div class="circle-icon"><i class="fa-solid fa-leaf"></i></div>
                <span>EcoPoints</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-gavel"></i></div>
                <span>Subastas</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-handshake"></i></div>
                <span>Trueque</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-truck-fast"></i></div>
                <span>Envíos</span>
            </div>
        </section>

        <section class="app-hero-banner toggleable-section">
            <a href="index.html"> 
                <img src="imagenes/PORTADA1.png" alt="Grandes Ofertas" loading="lazy">
            </a>
        </section>

        <section class="app-section toggleable-section">
            <div class="section-header">
                <h2>Zonas Especiales</h2>
                <a href="#" class="view-all">Ver todo</a>
            </div>
            <div class="horizontal-scroll-container cards-large">
                <a href="Ecopoints.html" class="promo-card">
                    <img src="imagenes/ecopoint.png" alt="EcoPoints" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/SUBASTAS.png" alt="Subastas" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/trueque.png" alt="Trueque" loading="lazy">
                </a>
            </div>
        </section>

        <section class="app-section" id="results-section">
            <div class="section-header">
                <h2 id="dynamic-section-title">Recomendados para ti</h2>
            </div>
            
            <div class="horizontal-scroll-container products-carousel" id="product-list">
                </div>
            
            <div class="btn-container toggleable-section" style="display: flex; justify-content: center; margin-top: 15px; margin-bottom: 10px;">
                <a href="Productos.html" style="text-decoration: none;">
                    <button class="add-btn" style="width: auto; padding: 10px 25px; font-weight: 600; border-radius: 20px;">
                        Ver más recomendados
                    </button>
                </a>
            </div>
        </section>

        <section class="app-trust-section toggleable-section">
            <div class="trust-item">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Compra Segura</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-box-open"></i>
                <p>Devoluciones</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-headset"></i>
                <p>Centro de Ayuda</p>
            </div>
        </section>

        <footer class="app-footer-lite toggleable-section">
            <p>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</p>
            <div class="footer-links-lite">
                <a href="#">Términos</a>
                <a href="#">Privacidad</a>
                <a href="#">Políticas</a>
            </div>
        </footer>
    </main>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="Productos.html" class="nav-item">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Buscar</span>
        </a>
        
        <a href="FCompra.html" class="nav-item bottom-cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="bottom-cart-badge">0</span>
            <span>Bolsa</span>
        </a>

        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-box-archive"></i>
            <span>Pedidos</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Cuenta</span>
        </a>
    </nav>

    <script src="js/Products.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/search.js" defer></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const searchInput = document.getElementById('main-search-input');
            const productList = document.getElementById('product-list');
            const sectionsToHide = document.querySelectorAll('.toggleable-section');
            const sectionTitle = document.getElementById('dynamic-section-title');

            // EVENTO 1: Búsqueda en tiempo real mientras el usuario escribe
            searchInput.addEventListener('input', function(e) {
                const term = e.target.value.trim().toLowerCase();
                
                // Si el buscador está vacío, restauramos el inicio tal como estaba
                if (term === '') {
                    window.location.reload(); 
                    return;
                }

                // Aseguramos que la BD esté cargada
                if (window.allProducts && window.allProducts.length > 0) {
                    
                    // Ocultamos los banners y botones para que la pantalla parezca un catálogo
                    sectionsToHide.forEach(el => el.classList.add('search-active-hide'));
                    sectionTitle.textContent = 'Resultados de búsqueda';
                    
                    // Transformamos el carrusel horizontal en una cuadrícula (grid) para ver todo mejor
                    productList.classList.remove('horizontal-scroll-container', 'products-carousel');
                    productList.style.display = 'grid';
                    productList.style.gridTemplateColumns = 'repeat(auto-fill, minmax(130px, 1fr))';
                    productList.style.gap = '15px';
                    productList.style.padding = '0 15px';

                    // Buscamos directamente en TODA la base de datos (nunca fallará aunque borres texto)
                    const results = window.allProducts.filter(p => 
                        p.name.toLowerCase().includes(term) || 
                        (p.category && p.category.toLowerCase().includes(term))
                    );

                    if (results.length === 0) {
                        // Mensaje si no existe el producto
                        productList.style.display = 'block';
                        productList.innerHTML = `
                            <div style="width: 100%; text-align: center; padding: 40px 20px; color: #888;">
                                <i class="fa-solid fa-box-open fa-2xl" style="margin-bottom: 15px; color: #ddd;"></i><br>
                                No encontramos "${term}"
                            </div>`;
                    } else {
                        // Limpiamos y dibujamos las tarjetas de los resultados
                        productList.innerHTML = '';
                        results.forEach(rec => {
                            const originalPrice = rec.originalPrice || 0;
                            let finalPrice = originalPrice;
                            let priceHTML = "";

                            if (rec.discountPercent > 0) {
                                finalPrice = originalPrice * (1 - rec.discountPercent / 100);
                                priceHTML = `
                                    <span style="font-size: 10px; color: #999; text-decoration: line-through; display:block;">S/ ${originalPrice.toFixed(2)}</span>
                                    <span class="price-offer" style="font-size: 13px; color: #d0021b; font-weight: 700;">S/ ${finalPrice.toFixed(2)}</span>
                                `;
                            } else {
                                priceHTML = `
                                    <span class="price-offer" style="font-size: 13px; color: #6cc82a; font-weight: 700; display:block; margin-top:14px;">S/ ${finalPrice.toFixed(2)}</span>
                                `;
                            }

                            const imgSrc = rec.images?.main || "imagenes/default.jpg";
                            const badgeHTML = rec.discountPercent > 0 ? `<div class="discount-badge" style="font-size: 9px; padding: 2px 4px;">-${rec.discountPercent}%</div>` : '';

                            const card = document.createElement("div");
                            card.className = "app-product-card";
                            card.style.cssText = "width: 100%; flex: auto; margin-bottom: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); position: relative; cursor:pointer;";
                            
                            // Clic en el resultado manda al detalle
                            card.addEventListener("click", () => {
                                localStorage.setItem("selectedProductDetail", JSON.stringify(rec));
                                window.location.href = "producto-detalle.html";
                            });

                            card.innerHTML = `
                                <div class="product-image-container" style="height: 100px; padding: 5px;">
                                    ${badgeHTML}
                                    <img src="${imgSrc}" alt="${rec.name}" style="width:100%; height:100%; object-fit:contain;">
                                </div>
                                <div class="product-info" style="padding: 8px;">
                                    <p class="product-name" style="font-size: 11px; min-height: 28px; line-height: 1.2; margin-bottom: 4px; color:#333;">${rec.name}</p>
                                    ${priceHTML}
                                </div>
                            `;
                            productList.appendChild(card);
                        });
                    }
                }
            });

            // Lógica de la burbuja roja del carrito
            if(typeof window.updateCartBadge === 'function') {
                const originalUpdate = window.updateCartBadge;
                window.updateCartBadge = () => {
                    originalUpdate(); 
                    const cart = window.appCart || [];
                    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                    const bottomBadge = document.getElementById('bottom-cart-badge');
                    
                    if (bottomBadge) {
                        bottomBadge.textContent = totalItems;
                        if(totalItems > 0) {
                            bottomBadge.style.transform = 'scale(1.2)';
                            setTimeout(() => bottomBadge.style.transform = 'scale(1)', 200);
                        }
                    }
                };
                setTimeout(window.updateCartBadge, 300);
            }
        });

        // EVENTO 2: Si el usuario presiona "ENTER" o el botón buscar del teclado
        function executeMainSearch() {
            const searchInput = document.getElementById('main-search-input');
            const query = searchInput.value.trim();
            
            searchInput.blur(); // Cierra el teclado del celular
            
            if (query) {
                // Guarda la búsqueda para que Productos.html la procese (opcional si quieren ver el catálogo completo)
                localStorage.setItem('globalSearchQuery', query);
                window.location.href = 'Productos.html?q=' + encodeURIComponent(query);
            } else {
                window.location.href = 'Productos.html';
            }
        }
    </script>
</body>
</html>
