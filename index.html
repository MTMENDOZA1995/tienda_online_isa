<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-body">

    <header class="app-top-header">
        <div class="header-main-row">
            <div class="menu-icon"><i class="fa-solid fa-bars fa-lg"></i></div>
            <a href="index.html" class="app-logo-center">
                <img src="imagenes/logo.png" alt="Logo" class="logo-img">
                <span class="logo-text"></span>
            </a>
            <div class="cart-icon-top">
                <i class="fa-solid fa-cart-shopping fa-lg"></i>
                <span class="cart-badge">0</span>
            </div>
        </div>
        <div class="header-search-row">
            <div class="app-search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar en Innovación Sostenible de...">
                <i class="fa-solid fa-camera camera-icon"></i>
            </div>
        </div>
    </header>

    <main class="app-main-content">
        <section class="quick-access-scroll">
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-fire"></i></div>
                <span>Ofertas</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-leaf"></i></div>
                <span>EcoPoints</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-gavel"></i></div>
                <span>Subastas</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-handshake"></i></div>
                <span>Trueque</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-truck-fast"></i></div>
                <span>Envíos</span>
            </div>
        </section>

        <section class="app-hero-banner">
            <a href="index.html"> 
                <img src="imagenes/PORTADA1.png" alt="Grandes Ofertas" loading="lazy">
            </a>
        </section>

        <section class="app-section">
            <div class="section-header">
                <h2>Zonas Especiales</h2>
                <a href="#" class="view-all">Ver todo</a>
            </div>
            <div class="horizontal-scroll-container cards-large">
                <a href="index.html" class="promo-card">
                    <img src="imagenes/ecopoint.png" alt="EcoPoints" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/SUBASTAS.png" alt="Subastas" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/trueque.png" alt="Trueque" loading="lazy">
                </a>
            </div>
        </section>

            <section class="app-section">
                <div class="section-header">
                    <h2>Recomendados para ti</h2>
                </div>
                
                <div class="horizontal-scroll-container products-carousel" id="product-list">
                    </div>
                
                <div class="btn-container">
                    <a href="Productos.html">
                        <button class="add-btn" id="view-more-catalog-btn">Ver más recomendados</button>
                    </a>
                </div>
            </section>


        <section class="app-trust-section">
            <div class="trust-item">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Compra Segura</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-box-open"></i>
                <p>Devoluciones</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-headset"></i>
                <p>Centro de Ayuda</p>
            </div>
        </section>

        <footer class="app-footer-lite">
            <p>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</p>
            <div class="footer-links-lite">
                <a href="#">Términos</a>
                <a href="#">Privacidad</a>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="Productos.html" class="nav-item">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Buscar</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-box-archive"></i>
            <span>Mis Pedidos</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Mi Cuenta</span>
        </a>
    </nav>

    <script src="js/Products.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/search.js" defer></script>
