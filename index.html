<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Ajustes para alinear Logo y Buscador en la misma fila */
        .app-top-header {
            padding: 10px 15px;
        }
        .header-top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }
        /* El logo a la izquierda */
        .header-logo-compact {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        .header-logo-compact img {
            height: 35px; /* Ajusta el tamaño según tu logo */
            width: auto;
        }
        /* El buscador toma el resto del espacio */
        .header-search-form {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .header-search-form i.fa-magnifying-glass {
            position: absolute;
            left: 15px;
            color: #888;
            font-size: 14px;
        }
        .header-search-form input {
            width: 100%;
            border: none;
            border-radius: 25px;
            padding: 10px 15px 10px 40px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            outline: none;
        }
        .header-search-form i.camera-icon {
            position: absolute;
            right: 15px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
        }

        /* Estilos específicos para el badge en la barra inferior */
        .bottom-cart-icon {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bottom-cart-icon .cart-badge {
            position: absolute;
            top: -5px;
            right: 5px; 
            background-color: #ff3b30;
            color: white;
            font-size: 9px;
            font-weight: 700;
            height: 16px;
            min-width: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid white; 
            z-index: 10;
        }
    </style>
</head>
<body class="app-body">

    <header class="app-top-header">
        <div class="header-top-bar">
            <a href="index.html" class="header-logo-compact">
                <img src="imagenes/logo.png" alt="Logo">
            </a>
            
            <form class="header-search-form" onsubmit="event.preventDefault(); executeMainSearch();">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="main-search-input" placeholder="Buscar Productos...">
                <i class="fa-solid fa-camera camera-icon"></i>
            </form>
        </div>
    </header>

    <main class="app-main-content">
        <section class="quick-access-scroll">
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-fire"></i></div>
                <span>Ofertas</span>
            </div>
            <div class="quick-item" onclick="window.location.href='Ecopoints.html'" style="cursor: pointer;">
                <div class="circle-icon"><i class="fa-solid fa-leaf"></i></div>
                <span>EcoPoints</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-gavel"></i></div>
                <span>Subastas</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-handshake"></i></div>
                <span>Trueque</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-truck-fast"></i></div>
                <span>Envíos</span>
            </div>
        </section>

        <section class="app-hero-banner">
            <a href="index.html"> 
                <img src="imagenes/PORTADA1.png" alt="Grandes Ofertas" loading="lazy">
            </a>
        </section>

        <section class="app-section">
            <div class="section-header">
                <h2>Zonas Especiales</h2>
                <a href="#" class="view-all">Ver todo</a>
            </div>
            <div class="horizontal-scroll-container cards-large">
                <a href="Ecopoints.html" class="promo-card">
                    <img src="imagenes/ecopoint.png" alt="EcoPoints" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/SUBASTAS.png" alt="Subastas" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/trueque.png" alt="Trueque" loading="lazy">
                </a>
            </div>
        </section>

        <section class="app-section">
            <div class="section-header">
                <h2>Recomendados para ti</h2>
            </div>
            
            <div class="horizontal-scroll-container products-carousel" id="product-list">
                </div>
            
            <div class="btn-container" style="display: flex; justify-content: center; margin-top: 15px; margin-bottom: 10px;">
                <a href="Productos.html" style="text-decoration: none;">
                    <button class="add-btn" id="view-more-catalog-btn" style="width: auto; padding: 10px 25px; font-weight: 600; border-radius: 20px;">Ver más recomendados</button>
                </a>
            </div>
        </section>

        <section class="app-trust-section">
            <div class="trust-item">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Compra Segura</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-box-open"></i>
                <p>Devoluciones</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-headset"></i>
                <p>Centro de Ayuda</p>
            </div>
        </section>

        <footer class="app-footer-lite">
            <p>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</p>
            <div class="footer-links-lite">
                <a href="#">Términos</a>
                <a href="#">Privacidad</a>
                <a href="#">Políticas</a>
            </div>
        </footer>
    </main>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="Productos.html" class="nav-item">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Buscar</span>
        </a>
        
        <a href="FCompra.html" class="nav-item bottom-cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="bottom-cart-badge">0</span>
            <span>Bolsa</span>
        </a>

        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-box-archive"></i>
            <span>Pedidos</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Cuenta</span>
        </a>
    </nav>

    <script src="js/Products.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/search.js" defer></script>
    
    <script>
        // Función para ejecutar la búsqueda desde el input principal
        function executeMainSearch() {
            const query = document.getElementById('main-search-input').value.trim();
            if (query) {
                // Guarda la búsqueda en memoria para que Productos.html la atrape
                localStorage.setItem('globalSearchQuery', query);
                window.location.href = 'Productos.html?q=' + encodeURIComponent(query);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Reemplazamos la función original de cart.js para actualizar la barra inferior
            if(typeof window.updateCartBadge === 'function') {
                const originalUpdate = window.updateCartBadge;
                window.updateCartBadge = () => {
                    originalUpdate(); 
                    const cart = window.appCart || [];
                    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                    const bottomBadge = document.getElementById('bottom-cart-badge');
                    if (bottomBadge) {
                        bottomBadge.textContent = totalItems;
                        if(totalItems > 0) {
                            bottomBadge.style.transform = 'scale(1.2)';
                            setTimeout(() => bottomBadge.style.transform = 'scale(1)', 200);
                        }
                    }
                };
                setTimeout(window.updateCartBadge, 500);
            }
        });
    </script>
</body>
</html>
