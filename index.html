<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="app-body">

    <header class="app-top-header">
        <div class="header-top-bar">
            <a href="index.html" class="header-logo-compact" aria-label="Ir al inicio">
                <img src="imagenes/logo.png" alt="Logo">
            </a>
            
            <form class="header-search-form" action="javascript:void(0);" onsubmit="executeMainSearch();">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input 
                    type="search" 
                    id="main-search-input" 
                    placeholder="Buscar Productos..." 
                    enterkeyhint="search"
                    autocomplete="off"
                >
                <i class="fa-solid fa-camera camera-icon"></i>
            </form>
        </div>
    </header>

    <main class="app-main-content" id="main-content-area">
        
        <section class="quick-access-scroll toggleable-section">
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-fire"></i></div>
                <span>Ofertas</span>
            </div>
            <div class="quick-item" onclick="window.location.href='Ecopoints.html'" style="cursor: pointer;">
                <div class="circle-icon"><i class="fa-solid fa-leaf"></i></div>
                <span>EcoPoints</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-gavel"></i></div>
                <span>Subastas</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-handshake"></i></div>
                <span>Trueque</span>
            </div>
            <div class="quick-item">
                <div class="circle-icon"><i class="fa-solid fa-truck-fast"></i></div>
                <span>Envíos</span>
            </div>
        </section>

        <section class="app-hero-banner toggleable-section">
            <a href="Productos.html?discount=70"> 
                <img src="imagenes/PORTADA1.png" alt="Grandes Ofertas 70%" loading="lazy">
            </a>
        </section>

        <section class="app-section toggleable-section">
            <div class="section-header">
                <h2>Zonas Especiales</h2>
                <a href="#" class="view-all">Ver todo</a>
            </div>
            <div class="horizontal-scroll-container cards-large">
                <a href="Ecopoints.html" class="promo-card">
                    <img src="imagenes/ecopoint.png" alt="EcoPoints" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/SUBASTAS.png" alt="Subastas" loading="lazy">
                </a>
                <a href="index.html" class="promo-card">
                    <img src="imagenes/trueque.png" alt="Trueque" loading="lazy">
                </a>
            </div>
        </section>

        <section class="app-section" id="results-section">
            <div class="section-header">
                <h2 id="dynamic-section-title">Recomendados para ti</h2>
            </div>
            
            <div class="horizontal-scroll-container products-carousel" id="product-list">
                </div>
            
            <div class="btn-container toggleable-section" style="display: flex; justify-content: center; margin-top: 15px; margin-bottom: 10px;">
                <a href="Productos.html" style="text-decoration: none;">
                    <button style="background-color: #6cc82a; color: white; border: none; width: auto; padding: 10px 25px; font-weight: 600; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(108, 200, 42, 0.3);">
                        Ver todo el catálogo
                    </button>
                </a>
            </div>
        </section>

        <section class="app-trust-section toggleable-section">
            <div class="trust-item">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Compra Segura</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-box-open"></i>
                <p>Devoluciones</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-headset"></i>
                <p>Centro de Ayuda</p>
            </div>
        </section>

        <footer class="app-footer-lite toggleable-section">
            <p>INNOVACIÓN SOSTENIBLE & ARTÍCULOS</p>
            <div class="footer-links-lite">
                <a href="#">Términos</a>
                <a href="#">Privacidad</a>
                <a href="#">Políticas</a>
            </div>
        </footer>
    </main>

    <nav class="app-bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="Productos.html" class="nav-item">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Buscar</span>
        </a>
        
        <a href="FCompra.html" class="nav-item bottom-cart-icon">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="bottom-cart-badge">0</span>
            <span>Bolsa</span>
        </a>

        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-box-archive"></i>
            <span>Pedidos</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="fa-regular fa-user"></i>
            <span>Cuenta</span>
        </a>
    </nav>

    <script src="js/Products.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/index.js" defer></script> 

</body>
</html>
