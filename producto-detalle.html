<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalles del Producto | INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="Produc-Detalle.css"> 
</head>
<body class="app-body">

    <header class="app-top-header detail-header">
        <div class="header-main-row" style="margin-bottom: 0;">
            <button class="menu-icon back-btn" onclick="window.history.back();" style="background:none; border:none; color:white; cursor:pointer;">
                <i class="fa-solid fa-arrow-left fa-lg"></i>
            </button>
            
            <div class="header-actions" style="display:flex; gap:15px; align-items:center;">
                <a href="Productos.html" style="color: white;"><i class="fa-solid fa-magnifying-glass fa-lg"></i></a>
                <a href="index.html" style="color: white;"><i class="fa-solid fa-house fa-lg"></i></a>
                
                <div class="cart-icon-top">
                    <i class="fa-solid fa-cart-shopping fa-lg"></i>
                    <span class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="app-main-content product-detail-main" style="padding-bottom: 80px;">
        
        <section class="detail-image-section">
            <div class="main-image-wrapper">
                <span class="discount-badge detail-badge" id="detail-discount-badge" style="display: none;"></span>
                
                <img id="main-product-image" src="imagenes/default.jpg" alt="Producto">
                
                <button class="favorite-btn detail-fav-btn" aria-label="Agregar a favoritos"><i class="fa-regular fa-heart"></i></button>
            </div>
            
            <div class="thumbnail-images" id="thumbnail-container">
                </div>
        </section>

        <section class="detail-info-section">
            <h3 class="brand-name" id="product-category" style="font-size: 13px; margin-bottom: 5px;">Categoría</h3>
            <h1 class="detail-product-title" id="product-name">Cargando producto...</h1>
            
            <div class="detail-price-box">
                <s class="price-normal" id="product-price-old" style="font-size: 14px;"></s>
                <div style="display: flex; align-items: baseline; gap: 10px;">
                    <span class="price-offer" id="product-price" style="font-size: 26px;">S/ 0.00</span>
                    <span id="product-priceS" style="display:none; color:#6cc82a; font-weight:bold; font-size: 14px;"></span>
                </div>
            </div>
        </section>

        <section class="detail-options-section">
            
            <div class="option-group" id="model-group">
                <label>Modelo:</label>
                <div class="pill-selector" id="product-model-container">
                    </div>
            </div>

            <div class="option-group" id="color-group">
                <label>Color:</label>
                <div class="pill-selector" id="product-color-container">
                    </div>
            </div>

            <div class="option-group" id="size-group">
                <label>Tamaño:</label>
                <div class="pill-selector" id="product-size-container">
                    </div>
            </div>

            <div class="option-group quantity-group">
                <label>Cantidad:</label>
                <div class="quantity-selector">
                    <button class="qty-btn minus-btn">-</button>
                    <input type="number" id="product-quantity" value="1" min="1" readonly>
                    <button class="qty-btn plus-btn">+</button>
                </div>
                <span class="stock-info">Stock: <b id="product-stock">0</b> unidades</span>
            </div>

        </section>

        <section class="detail-description-section">
            
            <div class="accordion-item open">
                <div class="accordion-header">
                    <h3>Descripción</h3>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="accordion-body">
                    <p id="product-description">Cargando descripción...</p>
                    <p style="margin-top: 10px; font-size: 12px; color: #888;">Código: <span id="product-code"></span></p>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header">
                    <h3>Características</h3>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="accordion-body" style="display: none;">
                    <p id="product-shipping" style="white-space: pre-line;"></p>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header">
                    <h3>Información Adicional</h3>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="accordion-body" style="display: none;">
                    <ul id="product-additional-info" style="padding-left: 20px; font-size: 13px; color: #555;"></ul>
                </div>
            </div>

        </section>

        <section class="app-trust-section" style="margin-top: 15px;">
            <div class="trust-item">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Compra Segura</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-box-open"></i>
                <p>Devoluciones</p>
            </div>
            <div class="trust-item">
                <i class="fa-solid fa-truck-fast"></i>
                <p>Envíos a todo el país</p>
            </div>
        </section>

    </main>

    <div class="sticky-buy-bar">
        <button class="buy-btn btn-secondary" onclick="window.history.back();">Volver</button>
        <button class="buy-btn btn-primary" id="add-to-cart-btn">Agregar al carrito</button>
    </div>

    <script src="js/cart.js" defer></script>
    <script src="js/product-detail.js" defer></script>
</body>
</html>
