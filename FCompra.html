<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bolsa de Compras | INNOVACIÓN SOSTENIBLE & ARTÍCULOS</title>
    
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="FCompra.css"> 
</head>
<body class="app-body">

    <header class="app-top-header checkout-header">
        <div class="header-main-row" style="margin-bottom: 0; justify-content: center; position: relative;">
            <button class="menu-icon back-btn" onclick="window.location.href='Productos.html';" aria-label="Volver" style="background: none; border: none; color: white; cursor: pointer; position: absolute; left: 15px; padding: 0;">
                <i class="fa-solid fa-arrow-left fa-lg"></i>
            </button>
            <h1 style="color: white; font-weight: 600; font-size: 16px; margin: 0; letter-spacing: 0.5px;">
                Bolsa de Compras (1/3)
            </h1>
        </div>
    </header>

    <main class="app-main-content checkout-main" style="padding-bottom: 110px; padding-top: 15px;">
        
        <section class="checkout-section">
            <div class="checkout-order-items" id="step1-item-list">
                <div class="loading-state" style="text-align: center; padding: 40px 20px; color: #888; font-size: 13px;">
                    <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: #6cc82a; margin-bottom: 15px;"></i><br>
                    Cargando tu bolsa...
                </div>
            </div>
            
            <div class="checkout-totals">
                <div class="total-row final">
                    <span>Subtotal (Sin envío)</span>
                    <span id="step1-subtotal" style="color: #6cc82a; font-weight: 700;">S/ 0.00</span>
                </div>
            </div>
        </section>
        
        <section class="checkout-section" id="recommendations-section" style="padding: 0; background: transparent; box-shadow: none; margin-top: 20px;">
            <div class="section-header" style="margin: 20px 15px 10px 15px;">
                <h2 style="font-size: 15px; font-weight: 600; color: #333;">Completa tu pedido con:</h2>
            </div>
            
            <div class="horizontal-scroll-container" id="recommended-list">
                <div style="font-size: 12px; color:#888; padding-left: 15px;">
                    Agrega más productos desde el catálogo para obtener envío gratis.
                </div>
            </div>
        </section>

    </main>

    <div class="sticky-buy-bar" style="position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.06); border-radius: 20px 20px 0 0; z-index: 100;">
        <div style="display: flex; flex-direction: column; justify-content: center; flex: 0.6;">
            <span style="font-size: 10px; color: #888; text-transform: uppercase; font-weight: 600;">Subtotal</span>
            <span id="sticky-step1-total" style="font-size: 18px; font-weight: 700; color: #333;">S/ 0.00</span>
        </div>
        <button class="buy-btn btn-primary" id="btn-continuar-compra" style="flex: 1; border: none; background-color: #6cc82a; color: white; padding: 14px; border-radius: 25px; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(108, 200, 42, 0.3);">
            Continuar Compra
        </button>
    </div>

    <script src="js/Products.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/FCompra.js" defer></script> 
</body>
</html>
