<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bolsa de Compras | Importaciones Sostenibles</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="FCompra.css"> 
</head>
<body class="app-body">

    <header class="app-top-header checkout-header">
        <div class="header-main-row" style="margin-bottom: 0; justify-content: center; position: relative;">
            <button class="menu-icon back-btn" onclick="window.location.href='Productos.html';" style="background:none; border:none; color:white; cursor:pointer; position: absolute; left: 0;">
                <i class="fa-solid fa-arrow-left fa-lg"></i>
            </button>
            <div style="color: white; font-weight: 600; font-size: 15px;">
                Bolsa de Compras (1/3)
            </div>
        </div>
    </header>

    <main class="app-main-content checkout-main" style="padding-bottom: 80px;">
        <section class="checkout-section">
            <div class="checkout-order-items" id="step1-item-list">
                <div style="text-align: center; padding: 20px; color: #888; font-size: 12px;">Cargando...</div>
            </div>
            <div class="checkout-totals">
                <div class="total-row final">
                    <span>Subtotal (Sin envío)</span>
                    <span id="step1-subtotal" style="color: #6cc82a;">S/ 0.00</span>
                </div>
            </div>
        </section>
        
        <div class="section-header" style="margin: 20px 15px 10px 15px;">
            <h2 style="font-size: 14px; color: #555;">Completa tu pedido con:</h2>
        </div>
        <div class="horizontal-scroll-container" id="recommended-list">
            <div style="font-size: 11px; color:#888; padding-left: 15px;">Agrega más productos desde el catálogo para obtener envío gratis.</div>
        </div>
    </main>

    <div class="sticky-buy-bar">
        <div style="display: flex; flex-direction: column; justify-content: center; flex: 0.5;">
            <span style="font-size: 10px; color: #888;">Subtotal</span>
            <span id="sticky-step1-total" style="font-size: 16px; font-weight: 700; color: #333;">S/ 0.00</span>
        </div>
        <button class="buy-btn btn-primary" id="btn-continuar-compra" style="flex: 1; border: none;">Continuar Compra</button>
    </div>

    <script src="js/cart.js" defer></script>
    <script src="js/Products.js" defer></script>
    <script src="js/FCompra.js" defer></script> 
</body>
</html>
